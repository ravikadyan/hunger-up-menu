<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hunger Up Food Court & Dhaba</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --primary:#1A1A1A;
      --accent:#F5C518;
      --bg:#F7F7F7;
      --card:#fff;
      --text:#1A1A1A;
      --muted:#6B6B6B;
      --border:#E8E8E8;
      --green:#10B981;
      --red:#EF4444;
      --radius:14px;
    }
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);padding-bottom:120px;}

    /* HEADER */
    .header{background:var(--primary);padding:28px 20px 36px;text-align:center;position:relative;overflow:hidden;}
    .header::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:24px;background:var(--bg);border-radius:24px 24px 0 0;}
    .logo{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:var(--accent);line-height:1;}
    .logo-sub{font-size:12px;color:rgba(255,255,255,0.6);letter-spacing:2px;text-transform:uppercase;margin:4px 0 14px;}
    .table-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(245,197,24,0.15);border:1px solid rgba(245,197,24,0.3);padding:7px 16px;border-radius:100px;color:var(--accent);font-size:13px;font-weight:600;}

    /* SEARCH */
    .search-wrap{padding:14px 16px 0;background:var(--bg);}
    .search-inner{position:relative;}
    .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--muted);}
    .search-input{width:100%;padding:11px 16px 11px 42px;border:1.5px solid var(--border);border-radius:12px;font-size:14px;background:#fff;font-family:'Inter',sans-serif;}
    .search-input:focus{outline:none;border-color:var(--accent);}

    /* CATEGORIES SCROLL */
    .cats{display:flex;gap:8px;padding:14px 16px;overflow-x:auto;scrollbar-width:none;background:var(--bg);}
    .cats::-webkit-scrollbar{display:none;}
    .cat{flex-shrink:0;padding:8px 14px;border-radius:100px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .18s;}
    .cat.active{background:var(--primary);color:#fff;border-color:var(--primary);}

    /* SECTION */
    .section{padding:0 16px 8px;}
    .sec-title{font-size:17px;font-weight:700;color:var(--primary);padding:12px 0 10px;border-bottom:2px solid var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:8px;}

    /* PHOTO GRID */
    .photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
    .photo-card{background:#fff;border-radius:var(--radius);overflow:hidden;border:1.5px solid var(--border);cursor:pointer;transition:all .2s;}
    .photo-card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(0,0,0,0.08);}
    .photo-card img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;}
    .photo-card-body{padding:10px 10px 12px;}
    .photo-card-name{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:6px;line-height:1.3;}
    .badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;margin-bottom:6px;}
    .badge-popular{background:#FEF3C7;color:#92400E;}
    .badge-musttry{background:#FEE2E2;color:#991B1B;}
    .badge-bestseller{background:#D1FAE5;color:#065F46;}

    /* PORTION TOGGLE IN CARD */
    .portion-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
    .pt-btn{flex:1;padding:5px 0;border-radius:8px;border:1.5px solid var(--border);background:#fff;font-size:11px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s;line-height:1.3;}
    .pt-btn .pt-label{color:var(--muted);font-size:10px;display:block;}
    .pt-btn .pt-price{color:var(--primary);font-size:12px;display:block;}
    .pt-btn.active{border-color:var(--accent);background:#FFFDE7;}
    .pt-btn.active .pt-price{color:#92400E;}

    .card-add-btn{width:100%;padding:8px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;}
    .card-add-btn:hover{background:var(--accent);color:var(--primary);}
    .card-qty{display:flex;align-items:center;justify-content:space-between;background:var(--primary);border-radius:10px;padding:4px 8px;}
    .cq-btn{background:none;border:none;color:#fff;font-size:18px;font-weight:700;cursor:pointer;padding:0 6px;line-height:1;}
    .cq-num{color:#fff;font-size:14px;font-weight:700;}

    /* LIST ITEMS */
    .list-item{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;border:1.5px solid var(--border);display:flex;align-items:center;gap:10px;transition:all .2s;}
    .list-item:hover{border-color:var(--accent);}
    .li-info{flex:1;min-width:0;}
    .li-name{font-size:14px;font-weight:600;color:var(--primary);margin-bottom:4px;}
    .li-price{font-size:15px;font-weight:700;color:var(--primary);}
    .li-price-muted{font-size:12px;color:var(--muted);}

    /* LIST PORTION TOGGLE */
    .li-portion{display:flex;gap:4px;margin-bottom:6px;}
    .lp-btn{padding:3px 10px;border-radius:100px;border:1.5px solid var(--border);background:#fff;font-size:11px;font-weight:700;cursor:pointer;color:var(--muted);transition:all .15s;}
    .lp-btn.active{border-color:var(--accent);background:#FFFDE7;color:#92400E;}

    .li-add{width:34px;height:34px;border-radius:9px;border:none;background:var(--primary);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
    .li-add:hover{background:var(--accent);color:var(--primary);}
    .li-qty{display:flex;align-items:center;gap:6px;flex-shrink:0;}
    .lq-btn{width:28px;height:28px;border-radius:7px;border:1.5px solid var(--border);background:#fff;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
    .lq-btn:hover{background:var(--primary);color:#fff;}
    .lq-num{font-size:14px;font-weight:700;min-width:18px;text-align:center;}

    /* CART BAR */
    .cart-bar{position:fixed;bottom:16px;left:16px;right:16px;background:var(--primary);border-radius:16px;padding:14px 18px;display:none;align-items:center;justify-content:space-between;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,0.25);cursor:pointer;max-width:800px;margin:0 auto;}
    .cart-bar.show{display:flex;}
    .cb-left{}
    .cb-count{font-size:11px;color:rgba(255,255,255,0.6);}
    .cb-total{font-size:18px;font-weight:700;color:var(--accent);}
    .cb-right{font-size:14px;font-weight:700;color:var(--accent);}

    /* FLOATING MENU BTN */
    .fab-menu{position:fixed;bottom:88px;right:16px;z-index:99;background:var(--primary);color:var(--accent);border:none;border-radius:50%;width:52px;height:52px;font-size:22px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center;transition:all .2s;}
    .fab-menu:hover{transform:scale(1.08);}

    /* CATEGORY DRAWER */
    .drawer-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:none;}
    .drawer-backdrop.show{display:block;}
    .cat-drawer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;padding:20px 16px 40px;z-index:201;transform:translateY(100%);transition:transform .3s ease;max-height:75vh;overflow-y:auto;}
    .cat-drawer.show{transform:translateY(0);}
    .drawer-title{font-size:16px;font-weight:700;margin-bottom:16px;text-align:center;color:var(--primary);}
    .drawer-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
    .drawer-cat{background:var(--bg);border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer;border:1.5px solid var(--border);transition:all .2s;}
    .drawer-cat:hover,.drawer-cat.active{border-color:var(--accent);background:#FFFDE7;}
    .drawer-cat-icon{font-size:24px;margin-bottom:4px;}
    .drawer-cat-name{font-size:11px;font-weight:600;color:var(--primary);line-height:1.2;}

    /* CART MODAL */
    .cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;display:none;}
    .cart-overlay.show{display:block;}
    .cart-modal{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;max-height:88vh;overflow-y:auto;z-index:301;transform:translateY(100%);transition:transform .3s ease;}
    .cart-modal.show{transform:translateY(0);}
    .cart-header{padding:18px 18px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1;}
    .cart-title{font-size:17px;font-weight:700;}
    .cart-close{font-size:22px;cursor:pointer;color:var(--muted);background:none;border:none;}
    .cart-items{padding:12px 18px;}
    .ci{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
    .ci-info{flex:1;}
    .ci-name{font-size:14px;font-weight:600;}
    .ci-portion{font-size:12px;color:var(--muted);}
    .ci-price{font-size:14px;font-weight:700;}
    .ci-qty{display:flex;align-items:center;gap:6px;}
    .ciq-btn{width:26px;height:26px;border-radius:6px;border:1.5px solid var(--border);background:#fff;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .ciq-num{font-size:13px;font-weight:700;min-width:16px;text-align:center;}
    .cart-summary{padding:14px 18px;background:var(--bg);border-top:1px solid var(--border);}
    .cs-row{display:flex;justify-content:space-between;font-size:14px;margin-bottom:6px;}
    .cs-total{font-size:18px;font-weight:700;}

    /* ORDER FORM */
    .order-form{padding:16px 18px 24px;}
    .form-title{font-size:15px;font-weight:700;margin-bottom:14px;}
    .form-group{margin-bottom:12px;}
    .form-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px;}
    .form-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:11px;font-size:14px;font-family:'Inter',sans-serif;}
    .form-input:focus{outline:none;border-color:var(--accent);}
    .place-btn{width:100%;padding:15px;background:var(--primary);color:#fff;border:none;border-radius:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;margin-top:6px;}
    .place-btn:hover{background:var(--accent);color:var(--primary);}
    .place-btn:disabled{opacity:.6;cursor:not-allowed;}

    /* STATUS */
    .status-screen{padding:32px 20px 40px;text-align:center;}
    .status-icon{font-size:60px;margin-bottom:14px;}
    .status-title{font-size:22px;font-weight:700;margin-bottom:8px;font-family:'Playfair Display',serif;}
    .status-sub{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:20px;}
    .spinner{width:52px;height:52px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 18px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .order-box{background:var(--bg);border-radius:12px;padding:14px;margin:14px 0;text-align:left;}
    .ob-row{display:flex;justify-content:space-between;font-size:14px;padding:5px 0;}
    .ob-row.total{font-weight:700;font-size:16px;border-top:1px solid var(--border);margin-top:4px;padding-top:10px;}
    .eta-box{background:#FEF3C7;color:#92400E;padding:11px 14px;border-radius:11px;font-size:14px;font-weight:600;margin:10px 0;}
    .close-btn{width:100%;padding:13px;background:var(--bg);border:1.5px solid var(--border);border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;}

    /* OFFER BANNER */
    .offer-banner{margin:8px 16px 4px;background:linear-gradient(135deg,#1A1A1A,#2a2a2a);border-radius:14px;padding:14px 16px;border:1px solid rgba(245,197,24,.25);}
    .ob-title{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:4px;}
    .ob-desc{font-size:11px;color:rgba(255,255,255,.65);line-height:1.5;}
    .ob-price{font-size:20px;font-weight:700;color:var(--accent);margin-top:6px;}

    @media(max-width:400px){.photo-grid{grid-template-columns:1fr 1fr;}.photo-card-name{font-size:12px;}}
  </style>
</head>
<body>

<div class="header">
  <div class="logo">Hunger Up</div>
  <div class="logo-sub">Food Court & Dhaba</div>
  <div class="table-pill">🪑 Table <span id="tableNum">-</span></div>
</div>

<div class="search-wrap">
  <div class="search-inner">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" placeholder="Search dishes..." oninput="renderAll()">
  </div>
</div>

<div class="cats" id="catsBar"></div>

<div class="offer-banner">
  <div class="ob-title">🎉 Special Party Offer — For 15 Persons</div>
  <div class="ob-desc">Shahi Paneer + Dal Makhni + Mix Veg + Raita + Salad + Rice + Roti + Naan + Limited Sweets</div>
  <div class="ob-price">₹2100/-</div>
</div>

<div id="menuRoot"></div>

<!-- FLOATING MENU BTN -->
<button class="fab-menu" onclick="openDrawer()" title="Jump to category">☰</button>

<!-- CART BAR -->
<div class="cart-bar" id="cartBar" onclick="openCart()">
  <div class="cb-left">
    <div class="cb-count" id="cartCount">0 items</div>
    <div class="cb-total" id="cartTotal">₹0</div>
  </div>
  <div class="cb-right">View Cart →</div>
</div>

<!-- CATEGORY DRAWER -->
<div class="drawer-backdrop" id="drawerBg" onclick="closeDrawer()"></div>
<div class="cat-drawer" id="catDrawer">
  <div class="drawer-title">Jump to Category</div>
  <div class="drawer-grid" id="drawerGrid"></div>
</div>

<!-- CART OVERLAY -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-modal" id="cartModal">
  <div class="cart-header">
    <div class="cart-title">Your Cart 🛒</div>
    <button class="cart-close" onclick="closeCart()">✕</button>
  </div>
  <div id="cartBody"></div>
</div>

const CAT_ICONS = {
  'All':'🍽️','Snacks':'🍟','Chat Snacks':'🥗','South Indian':'🥞',
  'Continental':'🍕','Rice':'🍚','Chinese':'🍜','Dal':'🫕',
  'Paneer':'🧀','Mashroom':'🍄','Special Chap':'🔥','Sabzi':'🥦',
  'Roti/Naan':'🫓','Thali/Combo':'🍱','Raita/Salad':'🥙','Beverages':'☕'
};

const BADGE_LABELS = {popular:'🔥 Popular', musttry:'⭐ Must Try', bestseller:'✅ Bestseller'};

const CATS = ['All', ...new Set(MENU.map(i => i.cat))];

// ── STATE ─────────────────────────────────────────────────────
let cart = [];
let activeCat = 'All';
// Per-item portion selection: itemId -> 'half'|'full'
const portionState = {};
let orderId = null;
let pollingInterval = null;

function getItemPortion(item) {
  if (!item.half && !item.full) return null;
  // Default to full if both exist, half if only half
  if (!portionState[item.id]) {
    portionState[item.id] = (item.full) ? 'full' : 'half';
  }
  return portionState[item.id];
}

function getItemPrice(item, portion) {
  if (item.price) return item.price;
  const p = portion || getItemPortion(item);
  return p === 'full' ? item.full : item.half;
}

function getCartKey(item, portion) {
  return `${item.id}_${portion || 'single'}`;
}

// ── CATEGORIES BAR ────────────────────────────────────────────
function renderCatsBar() {
  const el = document.getElementById('catsBar');
  el.innerHTML = CATS.map(c => `
    <button class="cat ${c===activeCat?'active':''}" onclick="setCategory('${c}')">
      ${CAT_ICONS[c]||'🍽️'} ${c}
    </button>`).join('');
}

function setCategory(cat) {
  activeCat = cat;
  closeDrawer();
  renderCatsBar();
  renderAll();
  document.getElementById('menuRoot').scrollIntoView({behavior:'smooth',block:'start'});
}

// ── DRAWER ────────────────────────────────────────────────────
function renderDrawer() {
  document.getElementById('drawerGrid').innerHTML = CATS.map(c => `
    <div class="drawer-cat ${c===activeCat?'active':''}" onclick="setCategory('${c}')">
      <div class="drawer-cat-icon">${CAT_ICONS[c]||'🍽️'}</div>
      <div class="drawer-cat-name">${c}</div>
    </div>`).join('');
}
function openDrawer(){document.getElementById('drawerBg').classList.add('show');document.getElementById('catDrawer').classList.add('show');renderDrawer();}
function closeDrawer(){document.getElementById('drawerBg').classList.remove('show');document.getElementById('catDrawer').classList.remove('show');}

// ── RENDER MENU ───────────────────────────────────────────────
function renderAll() {
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  const catsToShow = activeCat === 'All' ? CATS.filter(c=>c!=='All') : [activeCat];
  let html = '';

  catsToShow.forEach(cat => {
    let items = MENU.filter(i => i.cat === cat);
    if (search) items = items.filter(i => i.name.toLowerCase().includes(search));
    if (!items.length) return;

    const withPhoto = items.filter(i => i.img && i.badge);
    const withoutPhoto = items.filter(i => !i.img || !i.badge);

    html += `<div class="section" id="sec-${cat.replace(/\//g,'-')}">
      <div class="sec-title">${CAT_ICONS[cat]||'🍽️'} ${cat}</div>`;

    // PHOTO GRID
    if (withPhoto.length) {
      html += `<div class="photo-grid">`;
      withPhoto.forEach(item => {
        const portion = getItemPortion(item);
        const price = getItemPrice(item, portion);
        const key = getCartKey(item, portion || 'single');
        const cartItem = cart.find(c => c.key === key);
        const qty = cartItem ? cartItem.qty : 0;

        html += `<div class="photo-card">
          <img src="${IMGS[item.img]}" alt="${item.name}" loading="lazy">
          <div class="photo-card-body">
            ${item.badge ? `<div class="badge badge-${item.badge}">${BADGE_LABELS[item.badge]}</div>` : ''}
            <div class="photo-card-name">${item.name}</div>
            ${renderPortionToggleCard(item)}
            ${qty === 0
              ? `<button class="card-add-btn" onclick="addItem(${item.id})">+ Add ₹${getItemPrice(item, getItemPortion(item))}</button>`
              : `<div class="card-qty">
                  <button class="cq-btn" onclick="changeQty('${key}',-1)">−</button>
                  <span class="cq-num">${qty}</span>
                  <button class="cq-btn" onclick="changeQty('${key}',1)">+</button>
                </div>`
            }
          </div>
        </div>`;
      });
      html += `</div>`;
    }

    // LIST ITEMS
    withoutPhoto.forEach(item => {
      const portion = getItemPortion(item);
      const price = getItemPrice(item, portion);
      const key = getCartKey(item, portion || 'single');
      const cartItem = cart.find(c => c.key === key);
      const qty = cartItem ? cartItem.qty : 0;

      html += `<div class="list-item">
        <div class="li-info">
          <div class="li-name">${item.name}</div>
          ${renderPortionToggleList(item)}
          <div class="li-price">₹${price}</div>
        </div>
        ${qty === 0
          ? `<button class="li-add" onclick="addItem(${item.id})">+</button>`
          : `<div class="li-qty">
              <button class="lq-btn" onclick="changeQty('${key}',-1)">−</button>
              <span class="lq-num">${qty}</span>
              <button class="lq-btn" onclick="changeQty('${key}',1)">+</button>
            </div>`
        }
      </div>`;
    });

    html += `</div>`;
  });

  if (!html) html = `<div style="text-align:center;padding:60px 20px;color:#999"><div style="font-size:48px;margin-bottom:12px">🔍</div><p>No dishes found</p></div>`;
  document.getElementById('menuRoot').innerHTML = html;
}

function renderPortionToggleCard(item) {
  if (!item.half && !item.full) return '';
  const p = getItemPortion(item);
  if (item.half && !item.full) {
    // Only half price (plate items)
    return `<div style="font-size:12px;color:#92400E;font-weight:700;margin-bottom:6px;">₹${item.half} / plate</div>`;
  }
  return `<div class="portion-row">
    <button class="pt-btn ${p==='half'?'active':''}" onclick="setPortion(${item.id},'half',true);event.stopPropagation()">
      <span class="pt-label">Half</span>
      <span class="pt-price">₹${item.half}</span>
    </button>
    <button class="pt-btn ${p==='full'?'active':''}" onclick="setPortion(${item.id},'full',true);event.stopPropagation()">
      <span class="pt-label">Full</span>
      <span class="pt-price">₹${item.full}</span>
    </button>
  </div>`;
}

function renderPortionToggleList(item) {
  if (!item.half && !item.full) return '';
  const p = getItemPortion(item);
  if (item.half && !item.full) {
    return `<div style="font-size:11px;color:#92400E;font-weight:600;margin-bottom:3px;">Per plate</div>`;
  }
  return `<div class="li-portion">
    <button class="lp-btn ${p==='half'?'active':''}" onclick="setPortion(${item.id},'half',false)">Half ₹${item.half}</button>
    <button class="lp-btn ${p==='full'?'active':''}" onclick="setPortion(${item.id},'full',false)">Full ₹${item.full}</button>
  </div>`;
}

// ── PORTION SELECT ────────────────────────────────────────────
function setPortion(itemId, portion, isCard) {
  portionState[itemId] = portion;
  // If item already in cart under old portion key, don't auto-switch — just re-render
  renderAll();
  updateCartBar();
}

// ── ADD / QTY ─────────────────────────────────────────────────
function addItem(itemId) {
  const item = MENU.find(i => i.id === itemId);
  if (!item) return;
  const portion = getItemPortion(item);
  const key = getCartKey(item, portion || 'single');
  const price = getItemPrice(item, portion);
  const portionLabel = item.price ? '' : (item.full ? (portion === 'full' ? 'Full' : 'Half') : 'Plate');

  const existing = cart.find(c => c.key === key);
  if (existing) {
    existing.qty++;
  } else {
    cart.push({key, id: itemId, name: item.name, portion: portion || 'single', portionLabel, price, qty: 1});
  }
  updateCartBar();
  renderAll();
}

function changeQty(key, delta) {
  const idx = cart.findIndex(c => c.key === key);
  if (idx === -1) return;
  cart[idx].qty += delta;
  if (cart[idx].qty <= 0) cart.splice(idx, 1);
  updateCartBar();
  renderAll();
}

// ── CART BAR ──────────────────────────────────────────────────
function updateCartBar() {
  const total = cart.reduce((s,i)=>s+i.price*i.qty,0);
  const count = cart.reduce((s,i)=>s+i.qty,0);
  document.getElementById('cartTotal').textContent = '₹'+total;
  document.getElementById('cartCount').textContent = count+(count===1?' item':' items');
  document.getElementById('cartBar').classList.toggle('show', cart.length>0);
}

// ── CART MODAL ────────────────────────────────────────────────
function openCart() {
  renderCartBody();
  document.getElementById('cartOverlay').classList.add('show');
  document.getElementById('cartModal').classList.add('show');
}
function closeCart() {
  document.getElementById('cartOverlay').classList.remove('show');
  document.getElementById('cartModal').classList.remove('show');
}

function renderCartBody() {
  const total = cart.reduce((s,i)=>s+i.price*i.qty,0);
  let itemsHtml = cart.map(ci=>`
    <div class="ci">
      <div class="ci-info">
        <div class="ci-name">${ci.name}</div>
        ${ci.portionLabel?`<div class="ci-portion">${ci.portionLabel}</div>`:''}
      </div>
      <div class="ci-qty">
        <button class="ciq-btn" onclick="cartQty('${ci.key}',-1)">−</button>
        <span class="ciq-num">${ci.qty}</span>
        <button class="ciq-btn" onclick="cartQty('${ci.key}',1)">+</button>
      </div>
      <div class="ci-price">₹${ci.price*ci.qty}</div>
    </div>`).join('');

  document.getElementById('cartBody').innerHTML = `
    <div class="cart-items">${itemsHtml}</div>
    <div class="cart-summary">
      <div class="cs-row"><span>Subtotal</span><span>₹${total}</span></div>
      <div class="cs-row cs-total"><span>Total</span><span>₹${total}</span></div>
    </div>
    <div class="order-form">
      <div class="form-title">Your Details</div>
      <div class="form-group">
        <label class="form-label">Name</label>
        <input class="form-input" id="custName" placeholder="Enter your name" type="text">
      </div>
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input class="form-input" id="custPhone" placeholder="10-digit mobile number" type="tel" maxlength="10" inputmode="numeric">
      </div>
      <button class="place-btn" id="placeBtn" onclick="placeOrder()">Place Order — ₹${total}</button>
    </div>`;
}

function cartQty(key, delta) {
  const idx = cart.findIndex(c=>c.key===key);
  if (idx===-1) return;
  cart[idx].qty += delta;
  if (cart[idx].qty<=0) cart.splice(idx,1);
  updateCartBar();
  renderAll();
  if (cart.length===0){closeCart();return;}
  renderCartBody();
}

// ── PLACE ORDER ───────────────────────────────────────────────
async function placeOrder() {
  const name = document.getElementById('custName').value.trim();
  const phone = document.getElementById('custPhone').value.trim();
  if (!name){alert('⚠️ Please enter your name');return;}
  if (phone.length!==10||!/^\d+$/.test(phone)){alert('❌ Please enter valid 10-digit phone');return;}
  if (!['6','7','8','9'].includes(phone[0])){alert('❌ Phone must start with 6,7,8 or 9');return;}
  if (/^(\d)\1{9}$/.test(phone)){alert('❌ Invalid phone number');return;}

  const btn = document.getElementById('placeBtn');
  btn.disabled=true; btn.textContent='Placing Order...';

  orderId = 'ORD'+Date.now();
  const total = cart.reduce((s,i)=>s+i.price*i.qty,0);
  const items = cart.map(i=>`${i.name}${i.portionLabel?' ('+i.portionLabel+')':''} x${i.qty}`).join(', ');

  try {
    const resp = await fetch(SHEET_URL,{method:'POST',body:JSON.stringify({action:'placeOrder',name,phone,table:tableNum,items,total,payment:'cash'})});
    const result = await resp.json();
    if (result.result==='error'){alert('❌ '+result.message);btn.disabled=false;btn.textContent=`Place Order — ₹${total}`;return;}
    if (result.result==='approval_required'){orderId=result.orderId;showApprovalScreen(total);return;}
    if (result.result==='success'){orderId=result.orderId;showProcessingScreen(total);startPolling();}
  } catch(e){
    console.error(e);
    alert('❌ Error placing order. Please try again.');
    btn.disabled=false; btn.textContent=`Place Order — ₹${total}`;
  }
}

// ── STATUS SCREENS ────────────────────────────────────────────
function showProcessingScreen(total) {
  document.getElementById('cartBody').innerHTML=`
    <div class="status-screen">
      <div class="spinner"></div>
      <div class="status-title">Processing Order…</div>
      <div class="status-sub">Order ID: ${orderId}<br>Please wait while we confirm your order</div>
      <div class="order-box">
        <div class="ob-row"><span>Table</span><span>${tableNum}</span></div>
        <div class="ob-row total"><span>Total</span><span>₹${total}</span></div>
      </div>
    </div>`;
}

function showApprovalScreen(total) {
  document.getElementById('cartBody').innerHTML=`
    <div class="status-screen">
      <div class="status-icon">⏳</div>
      <div class="status-title">Pending Approval</div>
      <div class="status-sub">Your order is being reviewed due to high activity at your table. You will be notified shortly.</div>
      <div class="order-box">
        <div class="ob-row"><span>Table</span><span>${tableNum}</span></div>
        <div class="ob-row total"><span>Total</span><span>₹${total}</span></div>
      </div>
    </div>`;
}

function showConfirmedScreen(eta) {
  const total = cart.reduce((s,i)=>s+i.price*i.qty,0);
  document.getElementById('cartBody').innerHTML=`
    <div class="status-screen">
      <div class="status-icon">✅</div>
      <div class="status-title">Order Confirmed!</div>
      <div class="status-sub">Your order has been accepted by the kitchen</div>
      <div class="eta-box">⏱️ Estimated time: ${eta||'15–20 minutes'}</div>
      <div class="order-box">
        <div class="ob-row"><span>Table</span><span>${tableNum}</span></div>
        <div class="ob-row total"><span>Total</span><span>₹${total}</span></div>
      </div>
      <button class="close-btn" onclick="closeAfterOrder()">Close</button>
    </div>`;
}

function showReadyScreen() {
  document.getElementById('cartBody').innerHTML=`
    <div class="status-screen">
      <div class="status-icon">🍽️</div>
      <div class="status-title">Food is Ready!</div>
      <div class="status-sub">Our staff will serve you shortly. Enjoy your meal! 😊</div>
      <button class="close-btn" onclick="closeAfterOrder()">Close</button>
    </div>`;
}

function closeAfterOrder() {
  if (pollingInterval) clearInterval(pollingInterval);
  closeCart();
  cart=[]; updateCartBar(); renderAll();
}

// ── POLLING ───────────────────────────────────────────────────
function startPolling() {
  pollingInterval = setInterval(async()=>{
    try {
      const resp = await fetch(SHEET_URL);
      const data = await resp.json();
      if (data.result==='success'&&data.data){
        const order = data.data.slice(1).find(o=>o[0]===orderId);
        if (order){
          const status=order[7], eta=order[8]||'';
          if (status==='accepted'){clearInterval(pollingInterval);showConfirmedScreen(eta);}
          else if (status==='rejected'){
            clearInterval(pollingInterval);
            document.getElementById('cartBody').innerHTML=`<div class="status-screen"><div class="status-icon">❌</div><div class="status-title">Order Rejected</div><div class="status-sub">Sorry, the restaurant could not accept your order at this time. Please contact staff.</div><button class="close-btn" onclick="closeAfterOrder()">Close</button></div>`;
          }
        }
      }
    } catch(e){console.error(e);}
  },3000);
}

// ── INIT ──────────────────────────────────────────────────────
// Set all half/full items to 'full' by default
MENU.forEach(item => {
  if (item.half && item.full) portionState[item.id] = 'full';
  else if (item.half && !item.full) portionState[item.id] = 'half';
});

renderCatsBar();
renderAll();
</script>
